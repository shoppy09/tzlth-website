<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>找不到頁面｜職涯停看聽 Tim</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"></noscript>
<style>
  :root {
    --cream: #F5F0E8; --charcoal: #1C1C1A; --charcoal-soft: #3A3A37;
    --accent: #C4622D; --muted: #8A8780; --border: #D8D3C8; --white: #FDFCF9;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--cream); color: var(--charcoal); font-family: 'DM Sans', sans-serif; font-weight: 300; line-height: 1.7; min-height: 100vh; display: flex; flex-direction: column; }

  nav { position: sticky; top: 0; z-index: 100; background: rgba(245,240,232,.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 16px 60px; display: flex; align-items: center; justify-content: space-between; }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; color: var(--charcoal); text-decoration: none; }
  .nav-logo span { color: var(--accent); }

  .page-wrap { flex: 1; display: flex; align-items: center; justify-content: center; padding: 80px 24px; }
  .inner { max-width: 560px; text-align: center; }

  .num { font-family: 'Playfair Display', serif; font-size: clamp(80px, 15vw, 140px); font-weight: 600; color: var(--accent); line-height: 1; opacity: .15; margin-bottom: -20px; }
  .title { font-family: 'Playfair Display', serif; font-size: clamp(24px, 4vw, 36px); font-weight: 600; margin-bottom: 16px; color: var(--charcoal); }
  .sub { font-size: 15px; color: var(--muted); margin-bottom: 48px; }

  .links { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; }
  .btn-primary { display: inline-block; background: var(--accent); color: var(--white); padding: 14px 28px; border-radius: 8px; font-weight: 500; text-decoration: none; font-size: 14px; transition: opacity .2s; }
  .btn-primary:hover { opacity: .88; }
  .btn-outline { display: inline-block; border: 1.5px solid var(--border); color: var(--charcoal-soft); padding: 13px 28px; border-radius: 8px; font-weight: 500; text-decoration: none; font-size: 14px; transition: border-color .2s, color .2s; }
  .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

  footer { padding: 24px 60px; border-top: 1px solid var(--border); color: var(--muted); font-size: 13px; text-align: center; }
  @media (max-width: 768px) { nav { padding: 14px 24px; } footer { padding: 20px 24px; } }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">職涯<span>停看聽</span></a>
</nav>

<div class="page-wrap">
  <div class="inner">
    <p class="num">404</p>
    <h1 class="title">這個頁面不見了</h1>
    <p class="sub">可能是連結失效，或是頁面已移動。<br>不過你找我找對人了——職涯迷路也是我的專業。</p>
    <div class="links">
      <a href="/" class="btn-primary">回到首頁</a>
      <a href="/blog/" class="btn-outline">看文章</a>
      <a href="/#services" class="btn-outline">服務與定價</a>
      <a href="https://booking.careerssl.com" target="_blank" rel="noopener" class="btn-outline">預約初談</a>
    </div>
  </div>
</div>

<footer>
  © 2025 職涯停看聽 Tim
</footer>

</body>
</html>
