<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI 履歷快評（免費）｜職涯停看聽</title>
  <meta name="description" content="貼上履歷文字，30 秒獲得結構完整度、語言精準度、職位匹配度三維度 AI 免費評分，並取得改善建議。">
  <meta name="robots" content="index, follow">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ── CSS 變數：沿用官網設計語言 ── */
    :root {
      --cream:        #F5F0E8;
      --charcoal:     #1C1C1C;
      --charcoal-soft:#3D3D3D;
      --accent:       #C4622D;
      --accent-light: #E8834A;
      --muted:        #888;
      --border:       #E0D8CC;
      --white:        #FFFFFF;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--charcoal);
      line-height: 1.7;
    }

    /* ── 導覽列 ── */
    .nav {
      background: var(--charcoal);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-brand {
      font-family: 'Playfair Display', serif;
      color: var(--cream);
      font-size: 18px;
      text-decoration: none;
    }
    .nav-back {
      color: rgba(245,240,232,.6);
      font-size: 13px;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color .2s;
    }
    .nav-back:hover { color: var(--accent-light); }

    /* ── 主要容器 ── */
    .main {
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* ── 頁首 ── */
    .page-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }
    .page-badge::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
    }
    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 4vw, 40px);
      font-weight: 600;
      line-height: 1.3;
      margin-bottom: 14px;
    }
    .page-sub {
      font-size: 15px;
      font-weight: 300;
      color: var(--charcoal-soft);
      margin-bottom: 40px;
    }

    /* ── 輸入區 ── */
    .input-group { margin-bottom: 20px; }
    .input-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: var(--charcoal-soft);
      margin-bottom: 8px;
      letter-spacing: .02em;
    }
    .input-text {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 14px;
      background: var(--white);
      color: var(--charcoal);
      transition: border-color .2s;
    }
    .input-text:focus {
      outline: none;
      border-color: var(--accent);
    }
    textarea.input-text {
      height: 220px;
      resize: vertical;
    }
    .char-hint {
      font-size: 12px;
      color: var(--muted);
      text-align: right;
      margin-top: 6px;
    }

    /* ── 按鈕 ── */
    .btn-check {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--accent);
      color: var(--white);
      border: none;
      padding: 14px 36px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background .2s, transform .15s;
      margin-top: 8px;
    }
    .btn-check:hover:not(:disabled) { background: var(--accent-light); transform: translateY(-1px); }
    .btn-check:disabled { background: #ccc; cursor: not-allowed; transform: none; }

    /* ── 結果區 ── */
    .result-section {
      margin-top: 48px;
      padding-top: 40px;
      border-top: 1px solid var(--border);
    }
    .result-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 28px;
    }

    .score-row { margin-bottom: 24px; }
    .score-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--charcoal-soft);
      letter-spacing: .04em;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .score-label span { font-size: 16px; }
    .progress-track {
      background: #E8E0D4;
      border-radius: 99px;
      height: 10px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .progress-fill {
      background: var(--accent);
      height: 10px;
      border-radius: 99px;
      width: 0;
      transition: width .7s ease;
    }
    .score-meta {
      font-size: 13px;
      color: var(--charcoal-soft);
      display: flex;
      gap: 8px;
    }
    .score-num {
      font-weight: 600;
      color: var(--accent);
      white-space: nowrap;
    }

    /* ── 整體建議 ── */
    .overall-box {
      background: var(--white);
      border-left: 3px solid var(--accent);
      border-radius: 0 8px 8px 0;
      padding: 16px 20px;
      margin: 28px 0;
      font-size: 14px;
      line-height: 1.75;
      color: var(--charcoal);
    }
    .overall-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    /* ── CTA ── */
    .cta-block {
      background: var(--charcoal);
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      margin-top: 32px;
    }
    .cta-block h3 {
      font-family: 'Playfair Display', serif;
      color: var(--cream);
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .cta-block p {
      color: rgba(245,240,232,.6);
      font-size: 13px;
      font-weight: 300;
      margin-bottom: 20px;
    }
    .btn-cta {
      display: inline-block;
      background: var(--accent);
      color: var(--white);
      padding: 13px 30px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: background .2s, transform .15s;
    }
    .btn-cta:hover { background: var(--accent-light); transform: translateY(-1px); }

    /* ── 注意事項 ── */
    .disclaimer {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 40px;
      line-height: 1.7;
    }

    @media (max-width: 600px) {
      .nav { padding: 14px 20px; }
      .main { padding: 32px 16px 60px; }
      .cta-block { padding: 24px 20px; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a href="/" class="nav-brand">職涯停看聽</a>
  <a href="/#ai-tool" class="nav-back">← 回首頁</a>
</nav>

<main class="main">

  <div class="page-badge">Gemini AI 驅動 · 完全免費</div>
  <h1 class="page-title">AI 履歷快評</h1>
  <p class="page-sub">貼上你的履歷文字，30 秒取得三維度評分與改善方向。</p>

  <!-- 輸入區 -->
  <div class="input-group">
    <label class="input-label" for="jobTitle">目標職位（選填）</label>
    <input
      type="text"
      id="jobTitle"
      class="input-text"
      placeholder="例：行銷企劃、產品經理、業務專員"
      maxlength="60"
    >
  </div>

  <div class="input-group">
    <label class="input-label" for="resumeText">履歷內容（貼上純文字，最多 5000 字）</label>
    <textarea
      id="resumeText"
      class="input-text"
      placeholder="將履歷文字複製貼在這裡&#10;&#10;可包含：個人資料、工作經歷、學歷、技能等"
      maxlength="5000"
    ></textarea>
    <div class="char-hint"><span id="charCount">0</span> / 5000 字</div>
  </div>

  <button id="checkBtn" class="btn-check">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
    開始 AI 快評
  </button>

  <!-- 結果區 -->
  <div id="resultSection" class="result-section" style="display:none">
    <h2 class="result-title">快評結果</h2>

    <div class="score-row">
      <div class="score-label"><span>📋</span> 結構完整度</div>
      <div class="progress-track"><div class="progress-fill" id="structureBar"></div></div>
      <div class="score-meta">
        <span class="score-num" id="structureScore"></span>
        <span id="structureComment"></span>
      </div>
    </div>

    <div class="score-row">
      <div class="score-label"><span>✍️</span> 語言精準度</div>
      <div class="progress-track"><div class="progress-fill" id="languageBar"></div></div>
      <div class="score-meta">
        <span class="score-num" id="languageScore"></span>
        <span id="languageComment"></span>
      </div>
    </div>

    <div class="score-row">
      <div class="score-label"><span>🎯</span> 職位匹配度</div>
      <div class="progress-track"><div class="progress-fill" id="positionBar"></div></div>
      <div class="score-meta">
        <span class="score-num" id="positionScore"></span>
        <span id="positionComment"></span>
      </div>
    </div>

    <div class="overall-box">
      <div class="overall-label">整體建議</div>
      <div id="overallComment"></div>
    </div>

    <div class="cta-block">
      <h3>想針對弱項深度改善？</h3>
      <p>30 分鐘履歷深度評析，找出你的差距與改善路徑</p>
      <a href="https://booking.careerssl.com/?source=resume-quick-check" target="_blank" rel="noopener noreferrer" class="btn-cta">立即預約諮詢 →</a>
    </div>
  </div>

  <p class="disclaimer">
    你的履歷文字僅用於本次 AI 評估，不會被儲存或用於訓練。<br>
    快評為輔助參考，建議搭配<a href="https://diagnose.careerssl.com/" style="color:var(--accent)" target="_blank" rel="noopener noreferrer">完整 AI 履歷診斷</a>取得更詳細報告。
  </p>

</main>

<script src="/tools/resume-quick-check.js"></script>
</body>
</html>
